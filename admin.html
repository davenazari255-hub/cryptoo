<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KolonoEX — Withdrawals Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0e12; color: #e8edf7; padding: 16px; max-width: 760px; margin: 0 auto; }
    h1 { font-size: 19px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .sub { color: #7a8299; font-size: 12px; margin-bottom: 18px; }
    .gate { background: #161922; border: 0.5px solid #232838; border-radius: 14px; padding: 18px; }
    .gate input { width: 100%; background: #0f1117; border: 0.5px solid #2e3347; color: #e8edf7; border-radius: 10px; padding: 12px 14px; font-size: 14px; outline: none; margin: 10px 0; }
    .btn { background: #4eeaa0; color: #0d0e12; border: none; border-radius: 10px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn.sec { background: #1c2030; color: #cfd6e6; border: 0.5px solid #2e3347; }
    .btn.red { background: #ff5a5a; color: #fff; }
    .btn.amber { background: #ffae4e; color: #0d0e12; }
    .btn:disabled { opacity: .5; cursor: default; }
    .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .bar .pill { font-size: 12px; color: #7a8299; }
    .card { background: #161922; border: 0.5px solid #232838; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 4px 0; }
    .row .k { color: #7a8299; }
    .row .val { color: #e8edf7; word-break: break-all; text-align: right; }
    .amt { font-size: 20px; font-weight: 700; color: #4eeaa0; }
    .net { font-size: 11px; color: #cfd6e6; background: #0f1117; border: 0.5px solid #2e3347; border-radius: 6px; padding: 2px 8px; }
    .st { font-size: 11px; font-weight: 600; border-radius: 6px; padding: 2px 9px; text-transform: uppercase; }
    .st.pending { color: #ffae4e; background: #ffae4e1a; }
    .st.approved { color: #5d9bf5; background: #5d9bf51a; }
    .st.paid { color: #4eeaa0; background: #4eeaa01a; }
    .st.rejected { color: #ff5a5a; background: #ff5a5a1a; }
    .acts { display: flex; gap: 8px; margin-top: 12px; }
    .acts .btn { flex: 1; padding: 10px; }
    .addr-copy { cursor: pointer; color: #4eeaa0; margin-left: 6px; }
    .empty { text-align: center; color: #7a8299; padding: 40px 0; font-size: 14px; }
    .err { color: #ff5a5a; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1><i class="ti ti-shield-lock"></i> Withdrawals Admin</h1>
  <div class="sub">Review and approve user withdrawal requests. Funds are sent manually by you.</div>

  <div id="gate" class="gate">
    <div style="font-size:13px;color:#cfd6e6;">Enter admin secret to continue</div>
    <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off">
    <button class="btn" onclick="login()">Unlock</button>
    <div id="gate-err" class="err"></div>
  </div>

  <div id="app" style="display:none;">
    <div class="bar">
      <button class="btn sec" onclick="load()"><i class="ti ti-refresh"></i> Refresh</button>
      <span class="pill" id="count"></span>
      <button class="btn sec" style="margin-left:auto;" onclick="logout()">Lock</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    let SECRET = sessionStorage.getItem('kx_admin') || '';
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const fmt = (n) => Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const when = (t) => t ? new Date(t).toLocaleString() : '—';

    async function api(payload) {
      const r = await fetch('/api/admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: SECRET, ...payload }) });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('Error ' + r.status));
      return d;
    }

    async function login() {
      SECRET = $('secret').value.trim();
      if (!SECRET) return;
      try { await api({ action: 'list' }); sessionStorage.setItem('kx_admin', SECRET); $('gate').style.display = 'none'; $('app').style.display = 'block'; load(); }
      catch (e) { $('gate-err').textContent = e.message; }
    }
    function logout() { sessionStorage.removeItem('kx_admin'); location.reload(); }

    function copy(t) { navigator.clipboard && navigator.clipboard.writeText(t); }

    async function decide(id, decision) {
      if (decision === 'reject' && !confirm('Reject and refund this withdrawal?')) return;
      if (decision === 'paid' && !confirm('Confirm you have SENT the crypto to the address?')) return;
      try { await api({ action: 'decide', id, decision }); load(); }
      catch (e) { alert(e.message); }
    }

    function card(w) {
      const acts = (w.status === 'pending' || w.status === 'approved')
        ? '<div class="acts">'
          + (w.status === 'pending' ? '<button class="btn" onclick="decide(\'' + w.id + '\',\'approve\')">Approve</button>' : '')
          + '<button class="btn amber" onclick="decide(\'' + w.id + '\',\'paid\')">Mark Paid</button>'
          + '<button class="btn red" onclick="decide(\'' + w.id + '\',\'reject\')">Reject</button>'
          + '</div>'
        : '';
      return '<div class="card">'
        + '<div class="row" style="align-items:center;"><span class="amt">' + fmt(w.amount) + ' USDT</span>'
        + '<span style="display:flex;gap:8px;align-items:center;"><span class="net">' + esc(w.network) + '</span><span class="st ' + esc(w.status) + '">' + esc(w.status) + '</span></span></div>'
        + '<div class="row"><span class="k">Address</span><span class="val">' + esc(w.address) + ' <i class="ti ti-copy addr-copy" onclick="copy(\'' + esc(w.address) + '\')"></i></span></div>'
        + (w.memo ? '<div class="row"><span class="k">Memo</span><span class="val">' + esc(w.memo) + '</span></div>' : '')
        + '<div class="row"><span class="k">User</span><span class="val">' + esc(w.username ? '@' + w.username : (w.name || '')) + ' (' + esc(w.userId) + ')</span></div>'
        + '<div class="row"><span class="k">Requested</span><span class="val">' + when(w.createdAt) + '</span></div>'
        + acts + '</div>';
    }

    async function load() {
      try {
        const d = await api({ action: 'list' });
        const list = d.pending || [];
        $('count').textContent = list.length + ' pending';
        $('list').innerHTML = list.length ? list.map(card).join('') : '<div class="empty">No pending withdrawals 🎉</div>';
      } catch (e) { $('list').innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
    }

    if (SECRET) { $('gate').style.display = 'none'; $('app').style.display = 'block'; load(); }
  </script>
</body>
</html>
