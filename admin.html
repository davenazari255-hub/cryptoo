<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KolonoEX — Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0e12; color: #e8edf7; padding: 16px; max-width: 820px; margin: 0 auto; -webkit-tap-highlight-color: transparent; }
    h1 { font-size: 19px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .sub { color: #7a8299; font-size: 12px; margin-bottom: 16px; }
    input { font-family: inherit; }
    .gate { background: #161922; border: 0.5px solid #232838; border-radius: 14px; padding: 18px; }
    .gate input { width: 100%; background: #0f1117; border: 0.5px solid #2e3347; color: #e8edf7; border-radius: 10px; padding: 12px 14px; font-size: 14px; outline: none; margin: 10px 0; }
    .btn { background: #4eeaa0; color: #0d0e12; border: none; border-radius: 10px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn.sec { background: #1c2030; color: #cfd6e6; border: 0.5px solid #2e3347; }
    .btn.red { background: #ff5a5a; color: #fff; }
    .btn.amber { background: #ffae4e; color: #0d0e12; }
    .btn.blue { background: #5d9bf5; color: #fff; }
    .btn:disabled { opacity: .5; cursor: default; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 10px; background: #161922; border: 0.5px solid #232838; color: #9aa3b8; font-size: 14px; font-weight: 600; cursor: pointer; }
    .tab.on { background: #4eeaa01a; border-color: #4eeaa0; color: #4eeaa0; }
    .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .bar .pill { font-size: 12px; color: #7a8299; }
    .search { display: flex; align-items: center; gap: 8px; background: #161922; border: 0.5px solid #232838; border-radius: 10px; padding: 9px 13px; margin-bottom: 12px; }
    .search input { flex: 1; background: none; border: none; color: #e8edf7; font-size: 14px; outline: none; }
    .card { background: #161922; border: 0.5px solid #232838; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .card.click { cursor: pointer; }
    .card.click:active { background: #1b1f2b; }
    .row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 4px 0; }
    .row .k { color: #7a8299; flex-shrink: 0; }
    .row .val { color: #e8edf7; word-break: break-all; text-align: right; }
    .amt { font-size: 20px; font-weight: 700; color: #4eeaa0; }
    .net, .badge { font-size: 11px; color: #cfd6e6; background: #0f1117; border: 0.5px solid #2e3347; border-radius: 6px; padding: 2px 8px; }
    .st { font-size: 11px; font-weight: 600; border-radius: 6px; padding: 2px 9px; text-transform: uppercase; }
    .st.pending { color: #ffae4e; background: #ffae4e1a; } .st.approved { color: #5d9bf5; background: #5d9bf51a; }
    .st.paid { color: #4eeaa0; background: #4eeaa01a; } .st.rejected { color: #ff5a5a; background: #ff5a5a1a; }
    .st.banned { color: #ff5a5a; background: #ff5a5a1a; }
    .acts { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .acts .btn { flex: 1; padding: 10px; min-width: 90px; }
    .copy { cursor: pointer; color: #4eeaa0; margin-left: 6px; }
    .empty { text-align: center; color: #7a8299; padding: 40px 0; font-size: 14px; }
    .err { color: #ff5a5a; font-size: 13px; margin: 8px 0; }
    .sec-title { font-size: 12px; color: #7a8299; text-transform: uppercase; letter-spacing: .04em; margin: 18px 0 8px; }
    .u-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .u-av { width: 46px; height: 46px; border-radius: 50%; background: #4eeaa022; color: #4eeaa0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
    .u-name { font-size: 16px; font-weight: 700; }
    .u-id { font-size: 11px; color: #7a8299; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat { background: #0f1117; border: 0.5px solid #232838; border-radius: 10px; padding: 10px 12px; }
    .stat .l { font-size: 11px; color: #7a8299; } .stat .v { font-size: 16px; font-weight: 700; margin-top: 2px; }
    .li { background: #0f1117; border: 0.5px solid #232838; border-radius: 10px; padding: 9px 12px; margin-bottom: 6px; font-size: 12px; }
    .li .top { display: flex; justify-content: space-between; gap: 8px; }
    .mini { font-size: 11px; color: #7a8299; margin-top: 2px; }
    .adj { display: flex; gap: 8px; margin-top: 8px; }
    .adj input { flex: 1; background: #0f1117; border: 0.5px solid #2e3347; color: #e8edf7; border-radius: 9px; padding: 9px 11px; font-size: 13px; outline: none; min-width: 0; }
    .long { color: #4eeaa0; } .short { color: #ff5a5a; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: #9aa3b8; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="backBtn" class="back" style="display:none;" onclick="goExchange()"><i class="ti ti-arrow-left"></i> Back to exchange</div>
  <h1><i class="ti ti-shield-lock"></i> KolonoEX Admin</h1>
  <div class="sub">Manage users, balances and withdrawals.</div>

  <div id="gate" class="gate">
    <div style="font-size:13px;color:#cfd6e6;">Enter admin secret to continue</div>
    <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Unlock</button>
    <div id="gate-err" class="err"></div>
  </div>

  <div id="app" style="display:none;">
    <div class="tabs">
      <div class="tab on" id="tab-users" onclick="setTab('users')">Users</div>
      <div class="tab" id="tab-wd" onclick="setTab('wd')">Withdrawals</div>
      <div class="tab" id="tab-dep" onclick="setTab('dep')">Deposits</div>
    </div>
    <div class="bar">
      <button class="btn sec" onclick="refresh()"><i class="ti ti-refresh"></i> Refresh</button>
      <span class="pill" id="count"></span>
      <button class="btn sec" style="margin-left:auto;" onclick="logout()">Lock</button>
    </div>
    <div id="view"></div>
  </div>

  <script>
    let SECRET = sessionStorage.getItem('kx_admin') || '';
    // Telegram WebApp initData for in-app admin auth: from the WebApp object, or
    // forwarded by the mini app via the URL hash (#init=...) on navigation.
    let INIT = '';
    (function () {
      try { if (window.Telegram && Telegram.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); if (Telegram.WebApp.initData) INIT = Telegram.WebApp.initData; } } catch {}
      if (!INIT) { const m = location.hash.match(/(?:^#|&)init=([^&]+)/); if (m) { try { INIT = decodeURIComponent(m[1]); } catch {} } }
    })();
    let TAB = 'users';
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;');
    const fmt = (n) => Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const when = (t) => t ? new Date(t).toLocaleString() : '—';
    const ago = (t) => { if (!t) return '—'; const s = (Date.now() - t) / 1000; if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago'; };

    async function api(payload) {
      const r = await fetch('/api/admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ secret: SECRET, initData: INIT, ...payload }) });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || ('Error ' + r.status));
      return d;
    }
    function copy(t) { try { navigator.clipboard.writeText(t); } catch {} }

    async function login() {
      SECRET = $('secret').value.trim(); if (!SECRET) return;
      try { await api({ action: 'users' }); sessionStorage.setItem('kx_admin', SECRET); $('gate').style.display = 'none'; $('app').style.display = 'block'; refresh(); }
      catch (e) { $('gate-err').textContent = e.message; }
    }
    function logout() { sessionStorage.removeItem('kx_admin'); location.reload(); }
    function setTab(t) { TAB = t; $('tab-users').classList.toggle('on', t === 'users'); $('tab-wd').classList.toggle('on', t === 'wd'); $('tab-dep').classList.toggle('on', t === 'dep'); refresh(); }
    function refresh() { TAB === 'users' ? loadUsers() : TAB === 'wd' ? loadWithdrawals() : loadDeposits(); }

    /* ── Deposits report ── */
    async function loadDeposits() {
      $('view').innerHTML = '<div class="empty">Loading…</div>';
      try {
        const d = await api({ action: 'deposits' }); const list = d.deposits || [];
        $('count').textContent = list.length + ' deposits';
        const total = list.reduce((s, x) => s + (parseFloat(x.usd) || 0), 0);
        const head = '<div class="card"><div class="row"><span class="k">Total (last ' + list.length + ')</span><span class="val amt" style="font-size:16px;">$' + fmt(total) + '</span></div></div>';
        $('view').innerHTML = head + (list.length ? list.map(depCard).join('') : '<div class="empty">No deposits yet</div>');
      } catch (e) { $('view').innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
    }
    function depCard(x) {
      const isAdj = x.coin === 'ADMIN', isRef = x.coin === 'REFERRAL';
      const title = isRef ? 'Referral bonus' : isAdj ? 'Admin credit' : 'Deposit';
      return '<div class="card"><div class="row" style="align-items:center;"><span class="amt" style="font-size:17px;">+$' + fmt(x.usd) + '</span>'
        + '<span class="net">' + esc(title) + '</span></div>'
        + (x.coin && !isAdj && !isRef ? '<div class="row"><span class="k">Asset · Network</span><span class="val">' + esc(x.coin) + (x.network && x.network !== x.coin ? ' · ' + esc(x.network) : '') + '</span></div>' : '')
        + (x.actuallyPaid ? '<div class="row"><span class="k">Received</span><span class="val">' + esc(x.actuallyPaid) + ' ' + esc(x.coin || '') + '</span></div>' : '')
        + '<div class="row"><span class="k">User</span><span class="val" style="cursor:pointer;color:#5d9bf5;" onclick="openUser(\'' + esc(x.userId) + '\')">' + esc(x.userId) + '</span></div>'
        + (x.paymentId ? '<div class="row"><span class="k">Payment ID</span><span class="val">' + esc(x.paymentId) + '</span></div>' : '')
        + (x.note ? '<div class="row"><span class="k">Note</span><span class="val">' + esc(x.note) + '</span></div>' : '')
        + '<div class="row"><span class="k">Time</span><span class="val">' + when(x.at) + '</span></div></div>';
    }

    /* ── Withdrawals ── */
    async function decide(id, decision) {
      if (decision === 'reject' && !confirm('Reject and refund this withdrawal?')) return;
      if (decision === 'paid' && !confirm('Confirm you have SENT the crypto to the address?')) return;
      try { await api({ action: 'decide', id, decision }); loadWithdrawals(); } catch (e) { alert(e.message); }
    }
    function wdCard(w) {
      const acts = (w.status === 'pending' || w.status === 'approved')
        ? '<div class="acts">'
          + (w.status === 'pending' ? '<button class="btn" onclick="decide(\'' + w.id + '\',\'approve\')">Approve</button>' : '')
          + '<button class="btn amber" onclick="decide(\'' + w.id + '\',\'paid\')">Mark Paid</button>'
          + '<button class="btn red" onclick="decide(\'' + w.id + '\',\'reject\')">Reject</button></div>' : '';
      return '<div class="card"><div class="row" style="align-items:center;"><span class="amt">' + fmt(w.amount) + ' USDT</span>'
        + '<span style="display:flex;gap:8px;align-items:center;"><span class="net">' + esc(w.network) + '</span><span class="st ' + esc(w.status) + '">' + esc(w.status) + '</span></span></div>'
        + '<div class="row"><span class="k">Address</span><span class="val">' + esc(w.address) + ' <i class="ti ti-copy copy" onclick="copy(\'' + esc(w.address) + '\')"></i></span></div>'
        + (w.memo ? '<div class="row"><span class="k">Memo</span><span class="val">' + esc(w.memo) + '</span></div>' : '')
        + '<div class="row"><span class="k">User</span><span class="val">' + esc(w.username ? '@' + w.username : (w.name || '')) + ' (' + esc(w.userId) + ')</span></div>'
        + '<div class="row"><span class="k">Requested</span><span class="val">' + when(w.createdAt) + '</span></div>' + acts + '</div>';
    }
    async function loadWithdrawals() {
      $('view').innerHTML = '<div class="empty">Loading…</div>';
      try { const d = await api({ action: 'list' }); const list = d.pending || [];
        $('count').textContent = list.length + ' pending';
        $('view').innerHTML = list.length ? list.map(wdCard).join('') : '<div class="empty">No pending withdrawals 🎉</div>';
      } catch (e) { $('view').innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
    }

    /* ── Users ── */
    let USERS = [];
    function userCard(u) {
      return '<div class="card click" onclick="openUser(\'' + esc(u.userId) + '\')"><div class="row" style="align-items:center;">'
        + '<span style="display:flex;align-items:center;gap:10px;"><span class="u-av" style="width:38px;height:38px;font-size:16px;">' + esc((u.name || u.username || 'U').charAt(0).toUpperCase()) + '</span>'
        + '<span><div class="u-name" style="font-size:14px;">' + esc(u.name || u.username || 'User') + (u.username ? ' <span style="color:#7a8299;font-weight:400;font-size:12px;">@' + esc(u.username) + '</span>' : '') + '</div>'
        + '<div class="u-id">' + esc(u.userId) + ' · ' + ago(u.lastSeen) + '</div></span></span>'
        + '<span style="text-align:right;">' + (u.banned ? '<span class="st banned">banned</span><br>' : '') + '<span class="amt" style="font-size:16px;">$' + fmt(u.balance) + '</span></span></div>'
        + '<div class="row"><span class="k">Equity ≈ $' + fmt(u.equity) + ' · 🎁 $' + fmt(u.bonus) + '</span><span class="k"><i class="ti ti-users" style="font-size:11px;"></i> ' + (u.referrals || 0) + ' · ' + u.positions + ' pos</span></div></div>';
    }
    async function loadUsers() {
      $('view').innerHTML = '<div class="search"><i class="ti ti-search" style="color:#7a8299;"></i><input id="usearch" placeholder="Search name, username or id" oninput="renderUsers()"></div><div id="ulist"><div class="empty">Loading…</div></div>';
      try { const d = await api({ action: 'users' }); USERS = d.users || []; $('count').textContent = USERS.length + ' users'; renderUsers(); }
      catch (e) { $('view').innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
    }
    function renderUsers() {
      const q = ($('usearch') ? $('usearch').value : '').toLowerCase().trim();
      const list = USERS.filter(u => !q || (u.userId + ' ' + (u.username || '') + ' ' + (u.name || '')).toLowerCase().includes(q));
      $('ulist').innerHTML = list.length ? list.map(userCard).join('') : '<div class="empty">No users found</div>';
    }

    async function openUser(id) {
      $('view').innerHTML = '<div class="empty">Loading user…</div>';
      try { const d = await api({ action: 'user', id }); renderUser(d); }
      catch (e) { $('view').innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
    }

    function posRow(id, p) {
      return '<div class="li"><div class="top"><span class="' + (p.side === 'long' ? 'long' : 'short') + '">' + esc(p.pair) + ' ' + esc((p.side || '').toUpperCase()) + ' ' + (p.lev || '') + 'x</span>'
        + '<span>uPnL ' + fmt(p.upnl) + '</span></div>'
        + '<div class="mini">Entry ' + esc(p.entry) + ' · Margin ' + fmt(p.margin) + ' · TP ' + (p.tp || '—') + ' · SL ' + (p.sl || '—') + '</div>'
        + '<div class="acts"><button class="btn red" onclick="cmdClose(\'' + esc(id) + '\',' + p.id + ')">Force Close</button>'
        + '<button class="btn blue" onclick="cmdEdit(\'' + esc(id) + '\',' + p.id + ')">Edit TP/SL</button></div></div>';
    }
    function ordRow(id, o) {
      return '<div class="li"><div class="top"><span>' + esc(o.pair) + ' ' + esc((o.side || '').toUpperCase()) + ' ' + esc(o.type || '') + '</span>'
        + '<button class="btn red" style="padding:5px 10px;font-size:12px;" onclick="cmdCancel(\'' + esc(id) + '\',' + o.id + ')">Cancel</button></div>'
        + '<div class="mini">Price ' + esc(o.price) + ' · Amount ' + esc(o.amount) + '</div></div>';
    }
    function txRow(t) {
      const c = t.sign === '+' ? '#4eeaa0' : (t.sign === '-' ? '#ff5a5a' : '#9aa3b8');
      return '<div class="li"><div class="top"><span>' + esc(t.type || '') + '</span><span style="color:' + c + ';">' + esc(t.sign || '') + esc(t.value != null ? fmt(t.value) : '') + (t.isUSDT ? ' USDT' : '') + '</span></div>'
        + '<div class="mini">' + esc(t.sub || '') + ' · ' + esc(t.time || '') + '</div></div>';
    }

    let CUR = null;
    function renderUser(d) {
      CUR = d; const p = d.profile || {}; const id = p.userId;
      const positions = p.positions || [], orders = p.openOrders || [], holdings = p.holdings || [], txs = p.txs || [], deposits = d.deposits || [], wds = d.withdrawals || [];
      let h = '<div class="back" onclick="loadUsers()"><i class="ti ti-chevron-left"></i> Back to users</div>';
      h += '<div class="card"><div class="u-head"><div class="u-av">' + esc((p.name || p.username || 'U').charAt(0).toUpperCase()) + '</div>'
        + '<div><div class="u-name">' + esc(p.name || p.username || 'User') + '</div><div class="u-id">' + (p.username ? '@' + esc(p.username) + ' · ' : '') + esc(id) + '</div></div>'
        + '<div style="margin-left:auto;">' + (d.banned ? '<span class="st banned">banned</span>' : '<span class="st paid">active</span>') + '</div></div>'
        + '<div class="row"><span class="k">Joined</span><span class="val">' + when(p.joinedAt) + '</span></div>'
        + '<div class="row"><span class="k">Last seen</span><span class="val">' + when(p.lastSeen) + '</span></div>'
        + '<div class="row"><span class="k">Invited friends</span><span class="val">' + (d.referral ? d.referral.count : 0) + '</span></div>'
        + (d.referral && d.referral.referredBy ? '<div class="row"><span class="k">Referred by</span><span class="val">' + esc(d.referral.referredBy) + '</span></div>' : '')
        + '</div>';

      // Balances
      h += '<div class="grid2">'
        + '<div class="stat"><div class="l">Real balance</div><div class="v" style="color:#4eeaa0;">$' + fmt(d.balance) + '</div></div>'
        + '<div class="stat"><div class="l">Bonus</div><div class="v" style="color:#f0b90b;">' + fmt(p.bonus) + '</div></div>'
        + '<div class="stat"><div class="l">Equity ≈</div><div class="v">$' + fmt(p.equity) + '</div></div>'
        + '<div class="stat"><div class="l">Spot / Fut USDT</div><div class="v">' + fmt(p.usdt) + ' / ' + fmt(p.futUSDT) + '</div></div></div>';

      // Controls
      h += '<div class="sec-title">Controls</div><div class="card">'
        + '<div class="row"><span class="k">Adjust real balance (USDT)</span></div>'
        + '<div class="adj"><input id="adj-amt" inputmode="decimal" placeholder="+50 or -20"><input id="adj-note" placeholder="note (optional)" style="flex:1.4;"><button class="btn" onclick="doAdjust(\'' + esc(id) + '\')">Apply</button></div>'
        + '<div class="row" style="margin-top:12px;"><span class="k">Adjust bonus (USDT) — notifies user</span></div>'
        + '<div class="adj"><input id="bon-amt" inputmode="decimal" placeholder="+10 or -5"><input id="bon-note" placeholder="note to user (optional)" style="flex:1.4;"><button class="btn amber" onclick="doBonus(\'' + esc(id) + '\')">Send</button></div>'
        + '<div class="acts" style="margin-top:12px;">'
        + (d.banned ? '<button class="btn" onclick="doBan(\'' + esc(id) + '\',\'unban\')">Unban user</button>' : '<button class="btn red" onclick="doBan(\'' + esc(id) + '\',\'ban\')">Ban user</button>')
        + '<button class="btn sec" onclick="cmdMessage(\'' + esc(id) + '\')">Send message</button></div></div>';

      h += '<div class="sec-title">Open positions (' + positions.length + ')</div>' + (positions.length ? positions.map(x => posRow(id, x)).join('') : '<div class="empty" style="padding:14px;">None</div>');
      h += '<div class="sec-title">Open orders (' + orders.length + ')</div>' + (orders.length ? orders.map(x => ordRow(id, x)).join('') : '<div class="empty" style="padding:14px;">None</div>');
      if (holdings.length) h += '<div class="sec-title">Holdings</div>' + holdings.map(x => '<div class="li"><div class="top"><span>' + esc(x.coin) + '</span><span>' + (x.amount) + (x.value ? ' ≈ $' + fmt(x.value) : '') + '</span></div></div>').join('');
      h += '<div class="sec-title">Recent transactions</div>' + (txs.length ? txs.map(txRow).join('') : '<div class="empty" style="padding:14px;">None</div>');
      if (wds.length) h += '<div class="sec-title">Withdrawals</div>' + wds.map(w => '<div class="li"><div class="top"><span>' + fmt(w.amount) + ' USDT · ' + esc(w.network) + '</span><span class="st ' + esc(w.status) + '">' + esc(w.status) + '</span></div><div class="mini">' + esc(w.address || '') + '</div></div>').join('');
      if (deposits.length) h += '<div class="sec-title">Deposits / credits</div>' + deposits.map(x => '<div class="li"><div class="top"><span>' + esc(x.coin || '') + '</span><span>+$' + fmt(x.usd) + '</span></div>' + (x.note ? '<div class="mini">' + esc(x.note) + '</div>' : '') + '</div>').join('');
      $('view').innerHTML = h;
    }

    async function doAdjust(id) {
      const amount = parseFloat($('adj-amt').value); const note = $('adj-note').value.trim();
      if (!amount) return alert('Enter a non-zero amount (e.g. 50 or -20)');
      if (!confirm((amount > 0 ? 'Add ' : 'Deduct ') + Math.abs(amount) + ' USDT?')) return;
      try { await api({ action: 'adjust', id, amount, note }); openUser(id); } catch (e) { alert(e.message); }
    }
    async function doBonus(id) {
      const amount = parseFloat($('bon-amt').value); const note = $('bon-note').value.trim();
      if (!amount) return alert('Enter a non-zero bonus amount (e.g. 10 or -5)');
      if (!confirm((amount > 0 ? 'Add ' : 'Deduct ') + Math.abs(amount) + ' USDT bonus? The user will be notified.')) return;
      try { await api({ action: 'bonus', id, amount, note }); alert('Bonus queued — applies on the user\'s next sync; a bot message was sent now.'); openUser(id); } catch (e) { alert(e.message); }
    }
    async function doBan(id, action) {
      if (!confirm(action === 'ban' ? 'Ban this user? They will be locked out.' : 'Unban this user?')) return;
      try { await api({ action, id }); openUser(id); } catch (e) { alert(e.message); }
    }
    async function sendCmd(id, command, reopen) {
      try { await api({ action: 'command', id, command }); alert('Command queued — applies on the user\'s next sync (within ~1 min).'); if (reopen) openUser(id); }
      catch (e) { alert(e.message); }
    }
    function cmdClose(id, posId) { if (confirm('Force-close this position on the user\'s account?')) sendCmd(id, { type: 'closePosition', posId }); }
    function cmdCancel(id, orderId) { if (confirm('Cancel this open order?')) sendCmd(id, { type: 'cancelOrder', orderId }); }
    function cmdEdit(id, posId) {
      const tp = prompt('New Take-Profit price (blank = no change, 0 = remove):'); if (tp === null) return;
      const sl = prompt('New Stop-Loss price (blank = no change, 0 = remove):'); if (sl === null) return;
      const cmd = { type: 'editPosition', posId };
      if (tp.trim() !== '') cmd.tp = parseFloat(tp) || 0;
      if (sl.trim() !== '') cmd.sl = parseFloat(sl) || 0;
      sendCmd(id, cmd);
    }
    function cmdMessage(id) { const text = prompt('Message to show the user:'); if (text && text.trim()) sendCmd(id, { type: 'message', text: text.trim() }); }

    // Return to the mini app (the exchange). Used by the in-page back button and
    // the Telegram native back button when opened inside the mini app.
    function goExchange() { window.location.href = 'index.html'; }
    if (INIT) {
      $('backBtn').style.display = 'inline-flex';
      try { if (window.Telegram && Telegram.WebApp && Telegram.WebApp.BackButton) { Telegram.WebApp.BackButton.show(); Telegram.WebApp.BackButton.onClick(goExchange); } } catch {}
    }

    // Boot: prefer Telegram in-app admin auth, fall back to a stored secret,
    // otherwise show the secret gate (web access).
    async function boot() {
      if (INIT) {
        try { await api({ action: 'users' }); $('gate').style.display = 'none'; $('app').style.display = 'block'; refresh(); return; }
        catch (e) { /* not an admin via Telegram — fall through to the gate */ }
      }
      if (SECRET) { $('gate').style.display = 'none'; $('app').style.display = 'block'; refresh(); }
    }
    boot();
  </script>
</body>
</html>
